openapi: 3.1.0
info:
  title: QuantumBilling BFF — Core Control-Plane & Billing API
  version: 0.1.0
  description: |
    NestJS BFF (control plane) API for QuantumBilling, per ADR-001 and the uiflow
    user stories. This spec covers the **core surface** on the BUILD_PLAN critical
    path only — Phase CP (orgs, customers, end users, meters/facade) plus Track C
    money flows (catalog: products/plans/pricing-models/rate-cards/contracts;
    subscriptions; invoice presentment & pay; payments & payment methods; credits
    & prepaid wallet) and the two dashboard usage proxies.

    Architecture (ADR-001 §2):
    - The NestJS layer is a control plane + BFF. It stores **no raw usage events**;
      `POST /api/v1/meters/{meterId}/events` is a facade that translates and
      forwards to the Go ingest API (see `openapi/event-engine.yaml`).
    - Usage dashboards are **proxies** to the Go phase-4 analytics API
      (see `openapi/analytics.yaml`); the BFF validates the Keycloak JWT, derives
      org/customer scope, and forwards service-to-service.
    - Invoices, line items, credit notes, ledger entries, payments and wallet
      transactions are **written by the Go billing worker**; this API reads,
      presents, and forwards commands (pay, void, top-up) — it never creates
      invoices (the pre-ADR invoice-generation cron is deleted).
    - One-writer rule: NestJS writes control-plane config (catalog, customers,
      contracts, subscriptions, payment methods, wallet config); the billing
      worker writes financial artifacts.

    Authentication: Keycloak JWT bearer tokens (realm `quantumbilling`). Roles:
    SUPER_ADMIN, ORG_ADMIN, CUSTOMER, END_USER, DEVELOPER. Per-endpoint guards
    are documented via the `x-guard` extension (array of roles that pass the
    NestJS guard). The meter event facade authenticates with a meter API key
    (`X-Meter-Api-Key`) instead of a JWT.

    Canonical enums and naming follow the ERD.md conflict register: invoice
    status is lowercase `draft|pending|paid|overdue|voided` (C-4); invoice
    columns are `invoice_number`, `total`, `credits_applied` (C-19); customer
    status is `ACTIVE|SUSPENDED|CHURNED` (C-16); org status is
    `ACTIVE|SUSPENDED|DELETED` (C-14); subscription status is lowercase (C-12);
    credits use `remaining_amount` (C-18).

    **Scope note:** reporting, alerts, webhooks, AI chatbot/recommendations,
    audit/compliance, entitlement, rate-limiting, dunning-config and other
    Phase Post surfaces are intentionally **not yet in this spec**; it covers
    the CP → Track C critical path (plus the invoice/pay presentment flows),
    not all 35 stories.
servers:
  - url: /api/v1
    description: NestJS BFF (all paths below are relative to /api/v1)
security:
  - bearerAuth: []
tags:
  - name: Organizations
  - name: Customers
  - name: End Users
  - name: Meters
  - name: Catalog
  - name: Rate Cards
  - name: Contracts
  - name: Subscriptions
  - name: Invoices
  - name: Payments
  - name: Payment Methods
  - name: Credits & Wallet
  - name: Usage (proxy)

paths:
  # ─────────────────────────── Organizations ───────────────────────────
  /orgs:
    post:
      tags: [Organizations]
      operationId: createOrg
      summary: Create a new organization
      x-guard: [SUPER_ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrganizationCreate"
      responses:
        "201":
          description: Organization created with status ACTIVE
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }
    get:
      tags: [Organizations]
      operationId: listOrgs
      summary: List all organizations (paginated)
      x-guard: [SUPER_ADMIN]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated list of organizations
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedList"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/Organization"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /orgs/{orgId}:
    parameters:
      - $ref: "#/components/parameters/OrgId"
    get:
      tags: [Organizations]
      operationId: getOrg
      summary: Get organization details
      description: ORG_ADMIN may read their own org only (read-only).
      x-guard: [SUPER_ADMIN, ORG_ADMIN]
      responses:
        "200":
          description: Organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Organizations]
      operationId: updateOrg
      summary: Update organization fields (also reactivates a SUSPENDED org)
      description: >
        Patching a SUSPENDED org sets `status = ACTIVE` and clears
        `suspended_at` (C-14). Member sessions remain revoked until
        re-authentication.
      x-guard: [SUPER_ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrganizationUpdate"
      responses:
        "200":
          description: Updated organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [Organizations]
      operationId: suspendOrg
      summary: Soft-deactivate (suspend) an organization
      description: >
        Sets `identity.organizations.status = SUSPENDED` and stamps
        `suspended_at`; revokes all Keycloak sessions for members of the org.
        `?force=true` (with `ALLOW_FORCE_SUSPENSION=true`) bypasses the
        active-subscription check.
      x-guard: [SUPER_ADMIN]
      parameters:
        - name: force
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Organization suspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Org has active subscriptions and force is not enabled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  # ───────────────────────────── Customers ─────────────────────────────
  /customers:
    post:
      tags: [Customers]
      operationId: createCustomer
      summary: Create a customer for the authenticated ORG_ADMIN's org
      x-guard: [ORG_ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerCreate"
      responses:
        "201":
          description: Customer created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Customer" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }
    get:
      tags: [Customers]
      operationId: listCustomers
      summary: List customers for the org
      x-guard: [ORG_ADMIN]
      parameters:
        - name: status
          in: query
          schema: { $ref: "#/components/schemas/CustomerStatus" }
        - name: product_id
          in: query
          schema: { type: string, format: uuid }
        - name: search
          in: query
          schema: { type: string }
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated customer list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedList"
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Customer" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /customers/{customerId}:
    parameters:
      - $ref: "#/components/parameters/CustomerId"
    get:
      tags: [Customers]
      operationId: getCustomer
      summary: Get customer details (incl. linked org and product)
      description: CUSTOMER role may read their own account only.
      x-guard: [ORG_ADMIN, CUSTOMER]
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Customer" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Customers]
      operationId: updateCustomer
      summary: Update customer name, email, status
      x-guard: [ORG_ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Customer" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /customers/{customerId}/contacts:
    parameters:
      - $ref: "#/components/parameters/CustomerId"
    post:
      tags: [Customers]
      operationId: addCustomerContact
      summary: Add a contact for the customer
      x-guard: [ORG_ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactCreate"
      responses:
        "201":
          description: Contact created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Contact" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
    get:
      tags: [Customers]
      operationId: listCustomerContacts
      summary: List all contacts for the customer
      x-guard: [ORG_ADMIN, CUSTOMER]
      responses:
        "200":
          description: Contacts
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Contact" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ───────────────────────────── End Users ─────────────────────────────
  /customers/{customerId}/end-users:
    parameters:
      - $ref: "#/components/parameters/CustomerId"
    post:
      tags: [End Users]
      operationId: createEndUser
      summary: Create an end user under a customer
      x-guard: [ORG_ADMIN, CUSTOMER]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EndUserCreate"
      responses:
        "201":
          description: End user created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EndUser" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
    get:
      tags: [End Users]
      operationId: listEndUsers
      summary: List end users for a customer
      x-guard: [ORG_ADMIN, CUSTOMER]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated end-user list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedList"
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/EndUser" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /end-users/{endUserId}:
    parameters:
      - $ref: "#/components/parameters/EndUserId"
    get:
      tags: [End Users]
      operationId: getEndUser
      summary: Get end user
      x-guard: [ORG_ADMIN, CUSTOMER, END_USER]
      responses:
        "200":
          description: End user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EndUser" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [End Users]
      operationId: updateEndUser
      summary: Update end user
      x-guard: [ORG_ADMIN, CUSTOMER]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EndUserUpdate"
      responses:
        "200":
          description: Updated end user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EndUser" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [End Users]
      operationId: deleteEndUser
      summary: Delete end user (sets status to canceled)
      x-guard: [ORG_ADMIN, CUSTOMER]
      responses:
        "200":
          description: End user deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EndUser" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /end-users/{endUserId}/suspend:
    post:
      tags: [End Users]
      operationId: suspendEndUser
      summary: Suspend end user
      x-guard: [ORG_ADMIN, CUSTOMER]
      parameters:
        - $ref: "#/components/parameters/EndUserId"
      responses:
        "200":
          description: End user suspended
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EndUser" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /end-users/{endUserId}/reactivate:
    post:
      tags: [End Users]
      operationId: reactivateEndUser
      summary: Reactivate a suspended end user
      x-guard: [ORG_ADMIN, CUSTOMER]
      parameters:
        - $ref: "#/components/parameters/EndUserId"
      responses:
        "200":
          description: End user reactivated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EndUser" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ────────────────────────────── Meters ───────────────────────────────
  /meters:
    post:
      tags: [Meters]
      operationId: createMeter
      summary: Create a meter (DRAFT)
      x-guard: [ORG_ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeterCreate"
      responses:
        "201":
          description: Meter created in DRAFT status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Meter" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }
    get:
      tags: [Meters]
      operationId: listMeters
      summary: List meters for the org (all orgs for SUPER_ADMIN)
      x-guard: [SUPER_ADMIN, ORG_ADMIN, CUSTOMER, DEVELOPER]
      parameters:
        - name: status
          in: query
          schema: { $ref: "#/components/schemas/MeterStatus" }
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated meter list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedList"
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Meter" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /meters/{meterId}:
    parameters:
      - $ref: "#/components/parameters/MeterId"
    get:
      tags: [Meters]
      operationId: getMeter
      summary: Get meter details
      x-guard: [SUPER_ADMIN, ORG_ADMIN, CUSTOMER, DEVELOPER]
      responses:
        "200":
          description: Meter
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Meter" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Meters]
      operationId: updateMeter
      summary: Update meter name/field
      description: >
        `event_type` and `aggregation` are immutable once events exist
        (422 METER_AGGREGATION_IMMUTABLE).
      x-guard: [ORG_ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                field: { type: string }
      responses:
        "200":
          description: Updated meter
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Meter" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [Meters]
      operationId: deactivateMeter
      summary: Soft-deactivate a meter (status → INACTIVE)
      x-guard: [ORG_ADMIN]
      responses:
        "200":
          description: Meter deactivated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Meter" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: METER_LINKED_TO_PRICING — linked to active pricing models
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /meters/{meterId}/events:
    post:
      tags: [Meters]
      operationId: ingestMeterEvent
      summary: Ingest a usage event (facade → Go ingest API)
      description: |
        **Facade, not ingestion (ADR-001 §2.3).** Validates the meter and the
        `X-Meter-Api-Key`, translates `{value, timestamp, idempotency_key}`
        into the engine's `UsageEvent` shape (`event_id` ← namespaced
        idempotency key, `org_id` ← resolved from the API key, `event_type` ←
        the meter's event_type, `timestamp_ms` ← timestamp) and forwards to
        the Go ingest API (`POST /v1/events`, see `openapi/event-engine.yaml`).
        NestJS writes no usage row. Engine 202/409 responses are passed
        through unmodified. On success the facade stamps
        `catalog.meters.last_event_at` and transitions a DRAFT meter to ACTIVE.
      security:
        - meterApiKey: []
      x-guard: [MeterApiKeyGuard]
      parameters:
        - $ref: "#/components/parameters/MeterId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeterEventIngest"
      responses:
        "202":
          description: Event accepted by the Go ingest API (passthrough)
          content:
            application/json:
              schema:
                type: object
                properties:
                  event_id: { type: string }
                  status: { type: string, const: accepted }
        "401":
          description: Missing or invalid X-Meter-Api-Key
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: >
            DUPLICATE_EVENT (engine Redis idempotency hit within 24h, passed
            through) or METER_INACTIVE.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429":
          description: MAX_EVENTS_PER_METER_PER_DAY_EXCEEDED
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "502":
          description: INGEST_UNAVAILABLE — Go ingest API unreachable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  # ────────────────────────────── Products ─────────────────────────────
  /products:
    post:
      tags: [Catalog]
      operationId: createProduct
      summary: Create a product
      x-guard: [ORG_ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductCreate"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Product" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }
    get:
      tags: [Catalog]
      operationId: listProducts
      summary: List products for the org
      x-guard: [SUPER_ADMIN, ORG_ADMIN, CUSTOMER, DEVELOPER]
      parameters:
        - name: status
          in: query
          schema: { $ref: "#/components/schemas/ProductStatus" }
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated product list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedList"
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Product" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /products/{productId}:
    parameters:
      - name: productId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Catalog]
      operationId: getProduct
      summary: Get product details
      x-guard: [SUPER_ADMIN, ORG_ADMIN, CUSTOMER, DEVELOPER]
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Product" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Catalog]
      operationId: updateProduct
      summary: Update product
      x-guard: [ORG_ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Product" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [Catalog]
      operationId: archiveProduct
      summary: Archive product (soft delete)
      x-guard: [ORG_ADMIN]
      responses:
        "200":
          description: Product archived
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Product" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ────────────────────────────── Plans ────────────────────────────────
  /plans:
    post:
      tags: [Catalog]
      operationId: createPlan
      summary: Create a plan linked to a pricing model and/or product
      x-guard: [ORG_ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanCreate"
      responses:
        "201":
          description: Plan created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Plan" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }
    get:
      tags: [Catalog]
      operationId: listPlans
      summary: List plans for the org
      x-guard: [SUPER_ADMIN, ORG_ADMIN, CUSTOMER, DEVELOPER]
      parameters:
        - name: product_id
          in: query
          schema: { type: string, format: uuid }
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated plan list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedList"
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Plan" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /plans/{planId}:
    get:
      tags: [Catalog]
      operationId: getPlan
      summary: Get plan details (incl. charges)
      x-guard: [SUPER_ADMIN, ORG_ADMIN, CUSTOMER, DEVELOPER]
      parameters:
        - $ref: "#/components/parameters/PlanId"
      responses:
        "200":
          description: Plan
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Plan" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─────────────────────────── Pricing Models ──────────────────────────
  /pricing-models:
    post:
      tags: [Catalog]
      operationId: createPricingModel
      summary: Create a pricing model (DRAFT)
      x-guard: [ORG_ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PricingModelCreate"
      responses:
        "201":
          description: Pricing model created in DRAFT status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PricingModel" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }
    get:
      tags: [Catalog]
      operationId: listPricingModels
      summary: List pricing models for the org
      x-guard: [SUPER_ADMIN, ORG_ADMIN, CUSTOMER, DEVELOPER]
      parameters:
        - name: status
          in: query
          schema: { $ref: "#/components/schemas/CatalogStatus" }
        - name: pricing_type
          in: query
          schema: { $ref: "#/components/schemas/PricingType" }
        - name: meter_id
          in: query
          schema: { type: string, format: uuid }
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated pricing-model list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedList"
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/PricingModel" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /pricing-models/{modelId}:
    parameters:
      - name: modelId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Catalog]
      operationId: getPricingModel
      summary: Get pricing model with tiers
      x-guard: [SUPER_ADMIN, ORG_ADMIN, CUSTOMER, DEVELOPER]
      responses:
        "200":
          description: Pricing model with nested tiers
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PricingModel" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Catalog]
      operationId: updatePricingModel
      summary: Update pricing model (publish DRAFT → ACTIVE via status)
      description: >
        For ACTIVE models, changes are staged for the next billing cycle.
        The DRAFT → ACTIVE transition is one-way and final.
      x-guard: [SUPER_ADMIN, ORG_ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                status: { $ref: "#/components/schemas/CatalogStatus" }
                config: { type: object }
                minimum_amount: { type: [number, "null"] }
                maximum_amount: { type: [number, "null"] }
      responses:
        "200":
          description: Updated pricing model
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PricingModel" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [Catalog]
      operationId: archivePricingModel
      summary: Archive pricing model (soft delete, status → ARCHIVED)
      x-guard: [SUPER_ADMIN, ORG_ADMIN]
      responses:
        "200":
          description: Pricing model archived; existing subscriptions honoured
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PricingModel" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ───────────────────────────── Rate Cards ────────────────────────────
  /rate-cards:
    post:
      tags: [Rate Cards]
      operationId: createRateCard
      summary: Create a rate card (DRAFT)
      x-guard: [ORG_ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, effective_date]
              properties:
                org_id: { type: string, format: uuid }
                name: { type: string }
                effective_date: { type: string, format: date }
      responses:
        "201":
          description: Rate card created in DRAFT status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RateCard" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }
    get:
      tags: [Rate Cards]
      operationId: listRateCards
      summary: List rate cards for the org
      x-guard: [SUPER_ADMIN, ORG_ADMIN, CUSTOMER, DEVELOPER]
      parameters:
        - name: status
          in: query
          schema: { $ref: "#/components/schemas/CatalogStatus" }
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated rate-card list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedList"
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/RateCard" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /rate-cards/{rateCardId}:
    parameters:
      - $ref: "#/components/parameters/RateCardId"
    get:
      tags: [Rate Cards]
      operationId: getRateCard
      summary: Get rate card with all rates
      description: CUSTOMER may read only the rate card linked to their contract.
      x-guard: [SUPER_ADMIN, ORG_ADMIN, CUSTOMER, DEVELOPER]
      responses:
        "200":
          description: Rate card with rates
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RateCard" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Rate Cards]
      operationId: updateRateCard
      summary: Update rate card metadata/status (creates a new version)
      x-guard: [ORG_ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                effective_date: { type: string, format: date }
                status: { $ref: "#/components/schemas/CatalogStatus" }
      responses:
        "200":
          description: Updated rate card
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RateCard" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /rate-cards/{rateCardId}/rates:
    post:
      tags: [Rate Cards]
      operationId: addRateCardRates
      summary: Add one or more rates to the card
      description: >
        Each rate links a meter to a unit rate, with optional `model_name`
        (LLM model) and `token_type` for matrix pricing (CR-3). Edits on an
        ACTIVE card create a new `catalog.rate_card_versions` snapshot.
      x-guard: [ORG_ADMIN]
      parameters:
        - $ref: "#/components/parameters/RateCardId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items: { $ref: "#/components/schemas/RateCardRateCreate" }
      responses:
        "201":
          description: Rates added
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RateCardRate" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /rate-cards/{rateCardId}/rates/{rateId}:
    parameters:
      - $ref: "#/components/parameters/RateCardId"
      - name: rateId
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [Rate Cards]
      operationId: updateRateCardRate
      summary: Update a specific rate (versions the card if ACTIVE)
      x-guard: [ORG_ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rate: { type: number }
                model_name: { type: [string, "null"] }
                token_type: { $ref: "#/components/schemas/TokenType" }
                unit_label: { type: string }
      responses:
        "200":
          description: Updated rate
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RateCardRate" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [Rate Cards]
      operationId: deleteRateCardRate
      summary: Remove a rate from the card (versions the card if ACTIVE)
      x-guard: [ORG_ADMIN]
      responses:
        "204":
          description: Rate removed
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /rate-cards/{rateCardId}/assign:
    post:
      tags: [Rate Cards]
      operationId: assignRateCard
      summary: Assign this rate card to a contract
      x-guard: [ORG_ADMIN]
      parameters:
        - $ref: "#/components/parameters/RateCardId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contract_id]
              properties:
                contract_id: { type: string, format: uuid }
      responses:
        "200":
          description: Rate card linked to contract
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Contract" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: RATE_CARD_ARCHIVED — archived cards cannot be assigned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  # ───────────────────────────── Contracts ─────────────────────────────
  /contracts:
    post:
      tags: [Contracts]
      operationId: createContract
      summary: Create a contract (DRAFT)
      x-guard: [ORG_ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractCreate"
      responses:
        "201":
          description: Contract created in DRAFT status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Contract" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }
    get:
      tags: [Contracts]
      operationId: listContracts
      summary: List contracts for the org
      x-guard: [ORG_ADMIN]
      parameters:
        - name: status
          in: query
          schema: { $ref: "#/components/schemas/ContractStatus" }
        - name: customer_id
          in: query
          schema: { type: string, format: uuid }
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated contract list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedList"
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Contract" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /contracts/{contractId}:
    parameters:
      - $ref: "#/components/parameters/ContractId"
    get:
      tags: [Contracts]
      operationId: getContract
      summary: Get contract details (linked subscriptions, rates, discounts)
      description: CUSTOMER may read their own contract only.
      x-guard: [ORG_ADMIN, CUSTOMER]
      responses:
        "200":
          description: Contract
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Contract" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Contracts]
      operationId: updateContract
      summary: Update contract fields (name, commit_amount, auto_renew, status)
      x-guard: [ORG_ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                commit_amount: { type: number }
                auto_renew: { type: boolean }
                status: { $ref: "#/components/schemas/ContractStatus" }
      responses:
        "200":
          description: Updated contract
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Contract" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [Contracts]
      operationId: terminateContract
      summary: Soft-delete contract (status → TERMINATED)
      x-guard: [ORG_ADMIN]
      responses:
        "200":
          description: Contract terminated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Contract" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /contracts/{contractId}/rates:
    post:
      tags: [Contracts]
      operationId: addContractRate
      summary: Add/update contract-specific billing rates
      description: >
        `billing.contract_rates` — step 1 of the ADR-001 §3.3 rating
        waterfall; overrides the pinned rate-card version entry (step 2) and
        the plan charge's pricing model (step 3). Unmatched usage is flagged
        unrated (step 4), never billed at an implicit zero.
      x-guard: [ORG_ADMIN]
      parameters:
        - $ref: "#/components/parameters/ContractId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractRateCreate"
      responses:
        "201":
          description: Contract rate created/updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ContractRate" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

  # ─────────────────────────── Subscriptions ───────────────────────────
  /customers/{customerId}/subscriptions:
    parameters:
      - $ref: "#/components/parameters/CustomerId"
    post:
      tags: [Subscriptions]
      operationId: createSubscription
      summary: Create and assign a subscription to a customer
      x-guard: [SUPER_ADMIN, ORG_ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionCreate"
      responses:
        "201":
          description: Subscription created (anniversary window starts)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Subscription" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
    get:
      tags: [Subscriptions]
      operationId: listCustomerSubscriptions
      summary: List all subscriptions for a customer
      x-guard: [SUPER_ADMIN, ORG_ADMIN, CUSTOMER]
      responses:
        "200":
          description: Subscriptions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Subscription" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /organizations/{orgId}/subscriptions:
    get:
      tags: [Subscriptions]
      operationId: listOrgSubscriptions
      summary: List all subscriptions across an org's customers
      x-guard: [SUPER_ADMIN, ORG_ADMIN]
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - name: status
          in: query
          schema: { $ref: "#/components/schemas/SubscriptionStatus" }
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated subscription list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedList"
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Subscription" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /subscriptions/{subscriptionId}:
    parameters:
      - $ref: "#/components/parameters/SubscriptionId"
    get:
      tags: [Subscriptions]
      operationId: getSubscription
      summary: Get a specific subscription
      x-guard: [SUPER_ADMIN, ORG_ADMIN]
      responses:
        "200":
          description: Subscription
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Subscription" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [Subscriptions]
      operationId: updateSubscription
      summary: Update subscription (billing period, contract linkage)
      x-guard: [SUPER_ADMIN, ORG_ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                billingPeriod: { $ref: "#/components/schemas/BillingPeriod" }
                contractId: { type: [string, "null"], format: uuid }
      responses:
        "200":
          description: Updated subscription
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Subscription" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /subscriptions/{subscriptionId}/change-plan:
    post:
      tags: [Subscriptions]
      operationId: changeSubscriptionPlan
      summary: Change plan (upgrade/downgrade, prorated)
      description: >
        Mid-cycle plan changes prorate **both** the base fee and the
        included-unit allowance (ADR-001 §3.2); a `catalog.plan_versions`
        history row lets the billing worker rate each sub-window of the
        period against the plan active during it.
      x-guard: [SUPER_ADMIN, ORG_ADMIN]
      parameters:
        - $ref: "#/components/parameters/SubscriptionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [planId]
              properties:
                planId: { type: string, format: uuid }
                mode:
                  type: string
                  enum: [immediate, next_period]
                  default: immediate
      responses:
        "200":
          description: Plan changed; proration recorded for the billing worker
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Subscription" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /subscriptions/{subscriptionId}/cancel:
    post:
      tags: [Subscriptions]
      operationId: cancelSubscription
      summary: Cancel subscription (at period end or immediately)
      description: >
        Modes are constrained by the plan's cancellation policy (ADR-001
        §3.2). `end_of_period` sets `cancel_at_period_end = true`;
        `immediate` transitions to `canceled` now (refund treatment per plan
        policy).
      x-guard: [SUPER_ADMIN, ORG_ADMIN]
      parameters:
        - $ref: "#/components/parameters/SubscriptionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode:
                  type: string
                  enum: [immediate, end_of_period]
                reason: { type: string }
      responses:
        "200":
          description: Subscription canceled or scheduled for cancellation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Subscription" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

  # ────────────────────────────── Invoices ─────────────────────────────
  /organizations/{orgId}/invoices:
    get:
      tags: [Invoices]
      operationId: listOrgInvoices
      summary: List invoices for an org's customers
      description: >
        Read-only presentment over billing tables written by the Go billing
        worker (ADR-001 §2.4). Invoice creation has no NestJS endpoint.
      x-guard: [SUPER_ADMIN, ORG_ADMIN]
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - name: customer_id
          in: query
          schema: { type: string, format: uuid }
        - name: status
          in: query
          schema: { $ref: "#/components/schemas/InvoiceStatus" }
        - name: date_from
          in: query
          schema: { type: string, format: date }
        - name: date_to
          in: query
          schema: { type: string, format: date }
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated invoice list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedList"
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Invoice" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /invoices/{invoiceId}:
    get:
      tags: [Invoices]
      operationId: getInvoice
      summary: Invoice detail (header, grouped line items, credit notes, payments)
      x-guard: [SUPER_ADMIN, ORG_ADMIN, CUSTOMER]
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      responses:
        "200":
          description: Invoice
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Invoice" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /invoices/{invoiceId}/line-items:
    get:
      tags: [Invoices]
      operationId: listInvoiceLineItems
      summary: Line items with line_type, rate_source, subscription attribution
      x-guard: [SUPER_ADMIN, ORG_ADMIN, CUSTOMER]
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      responses:
        "200":
          description: Line items
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/InvoiceLineItem" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /invoices/{invoiceId}/pdf:
    get:
      tags: [Invoices]
      operationId: getInvoicePdf
      summary: Download invoice PDF
      description: Rendered by NestJS from worker-written data; stored at INVOICE_STORAGE_PATH.
      x-guard: [SUPER_ADMIN, ORG_ADMIN, CUSTOMER]
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      responses:
        "200":
          description: PDF document
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /invoices/{invoiceId}/pay:
    post:
      tags: [Invoices]
      operationId: payInvoice
      summary: "Pay Now: create a Stripe payment for the open balance"
      description: >
        Card/ACH via Stripe on a saved or provided payment method. Wire and
        manual recordings go through `POST /payments` and are forwarded to
        the billing worker. Auto-collection at finalization (CR-6) is the
        worker's job, not this endpoint's.
      x-guard: [ORG_ADMIN, CUSTOMER]
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                payment_method_id:
                  type: string
                  format: uuid
                  description: Defaults to the customer's default payment method
      responses:
        "202":
          description: Payment initiated (Stripe PaymentIntent created)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Payment" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Invoice not payable (already paid, voided, or draft)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /invoices/{invoiceId}/credit-notes:
    get:
      tags: [Invoices]
      operationId: listInvoiceCreditNotes
      summary: Credit/debit notes linked to the invoice
      x-guard: [SUPER_ADMIN, ORG_ADMIN, CUSTOMER]
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      responses:
        "200":
          description: Credit notes
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CreditNote" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /credit-notes/{creditNoteId}:
    get:
      tags: [Invoices]
      operationId: getCreditNote
      summary: Credit note detail (incl. re-rating run reference)
      x-guard: [SUPER_ADMIN, ORG_ADMIN, CUSTOMER]
      parameters:
        - name: creditNoteId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Credit note
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreditNote" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ────────────────────────────── Payments ─────────────────────────────
  /payments:
    post:
      tags: [Payments]
      operationId: recordManualPayment
      summary: Record a manual payment (wire/check)
      description: >
        `collection_mode` accepts only `manual` or `wire` — `auto_charge` is
        reserved for the Go billing worker (CR-6). A
        `billing.payment_reconciliation` record is created automatically with
        status `PENDING`.
      x-guard: [ORG_ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentRecordCreate"
      responses:
        "201":
          description: Payment recorded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Payment" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }
    get:
      tags: [Payments]
      operationId: listPayments
      summary: List payments (filterable by invoice)
      x-guard: [SUPER_ADMIN, ORG_ADMIN]
      parameters:
        - name: invoice_uuid
          in: query
          schema: { type: string, format: uuid }
        - name: customer_id
          in: query
          schema: { type: string, format: uuid }
        - name: status
          in: query
          schema: { $ref: "#/components/schemas/PaymentStatus" }
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated payment list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedList"
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Payment" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /payments/{paymentId}:
    get:
      tags: [Payments]
      operationId: getPayment
      summary: Full payment details (invoice, customer, method, reconciliation)
      x-guard: [SUPER_ADMIN, ORG_ADMIN]
      parameters:
        - name: paymentId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Payment
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Payment" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─────────────────────────── Payment Methods ─────────────────────────
  /customers/{customerId}/payment-methods:
    parameters:
      - $ref: "#/components/parameters/CustomerId"
    post:
      tags: [Payment Methods]
      operationId: addPaymentMethod
      summary: Add a payment method (Stripe tokenized — card data never stored)
      x-guard: [ORG_ADMIN, CUSTOMER]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentMethodCreate"
      responses:
        "201":
          description: Payment method added
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaymentMethod" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
    get:
      tags: [Payment Methods]
      operationId: listPaymentMethods
      summary: List payment methods for a customer
      x-guard: [ORG_ADMIN, CUSTOMER]
      responses:
        "200":
          description: Payment methods
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PaymentMethod" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /payment-methods/{pmId}:
    parameters:
      - $ref: "#/components/parameters/PaymentMethodId"
    put:
      tags: [Payment Methods]
      operationId: updatePaymentMethod
      summary: Update payment method (billing name/address, expiry)
      x-guard: [ORG_ADMIN, CUSTOMER]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                billing_name: { type: string }
                billing_address: { type: object }
                exp_month: { type: integer, minimum: 1, maximum: 12 }
                exp_year: { type: integer }
      responses:
        "200":
          description: Updated payment method
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaymentMethod" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [Payment Methods]
      operationId: removePaymentMethod
      summary: Remove payment method (soft delete)
      x-guard: [ORG_ADMIN, CUSTOMER]
      responses:
        "204":
          description: Payment method removed
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Cannot remove the default/auto-collection method while dunning or auto top-up depends on it
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /payment-methods/{pmId}/default:
    put:
      tags: [Payment Methods]
      operationId: setDefaultPaymentMethod
      summary: Set as default (auto-collection target, CR-6)
      x-guard: [ORG_ADMIN, CUSTOMER]
      parameters:
        - $ref: "#/components/parameters/PaymentMethodId"
      responses:
        "200":
          description: Default payment method set
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaymentMethod" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /payment-methods/{pmId}/wallet-topup:
    put:
      tags: [Payment Methods]
      operationId: setWalletTopupPaymentMethod
      summary: Designate as wallet top-up method (CR-2)
      description: Sets `billing.wallets.topup_payment_method_id` for the owning customer's wallet.
      x-guard: [ORG_ADMIN, CUSTOMER]
      parameters:
        - $ref: "#/components/parameters/PaymentMethodId"
      responses:
        "200":
          description: Wallet top-up method designated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Wallet" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─────────────────────────── Credits & Wallet ────────────────────────
  /organizations/{orgId}/credits:
    get:
      tags: [Credits & Wallet]
      operationId: listOrgCredits
      summary: List all credits for an organization's customers
      x-guard: [SUPER_ADMIN, ORG_ADMIN]
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - name: customer_id
          in: query
          schema: { type: string, format: uuid }
        - name: type
          in: query
          schema: { $ref: "#/components/schemas/CreditType" }
        - name: status
          in: query
          schema: { $ref: "#/components/schemas/CreditStatus" }
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated credit list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedList"
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Credit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /customers/{customerId}/credits:
    post:
      tags: [Credits & Wallet]
      operationId: grantCredit
      summary: Grant credits to a customer
      description: >
        Creates a `billing.credits` row and a `grant` ledger entry. Applied at
        invoice time FEFO within priority (compensation → promotional →
        prepaid → commit).
      x-guard: [SUPER_ADMIN, ORG_ADMIN]
      parameters:
        - $ref: "#/components/parameters/CustomerId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreditGrant"
      responses:
        "201":
          description: Credit granted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Credit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /credits/{creditId}:
    get:
      tags: [Credits & Wallet]
      operationId: getCredit
      summary: Get a specific credit
      x-guard: [SUPER_ADMIN, ORG_ADMIN]
      parameters:
        - $ref: "#/components/parameters/CreditId"
      responses:
        "200":
          description: Credit
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Credit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /credits/{creditId}/revoke:
    post:
      tags: [Credits & Wallet]
      operationId: revokeCredit
      summary: Revoke a credit (remaining amount zeroed, `revoked` ledger entry)
      x-guard: [SUPER_ADMIN, ORG_ADMIN]
      parameters:
        - $ref: "#/components/parameters/CreditId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200":
          description: Credit revoked
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Credit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Credit already exhausted, expired, or revoked
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /customers/{customerId}/credits/ledger:
    get:
      tags: [Credits & Wallet]
      operationId: getCreditLedger
      summary: Credit ledger (movement history)
      x-guard: [SUPER_ADMIN, ORG_ADMIN, CUSTOMER]
      parameters:
        - $ref: "#/components/parameters/CustomerId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated ledger entries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedList"
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/CreditLedgerEntry" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /customers/{customerId}/credits/balance:
    get:
      tags: [Credits & Wallet]
      operationId: getCreditBalance
      summary: Total credit balance for a customer
      x-guard: [SUPER_ADMIN, ORG_ADMIN, CUSTOMER]
      parameters:
        - $ref: "#/components/parameters/CustomerId"
      responses:
        "200":
          description: Balance
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer_id: { type: string, format: uuid }
                  total_remaining_amount: { type: number }
                  currency: { type: string }
                  by_type:
                    type: object
                    additionalProperties: { type: number }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /customers/{customerId}/wallet:
    get:
      tags: [Credits & Wallet]
      operationId: getWallet
      summary: Get wallet (balance, config, status)
      description: >
        CR-2 prepaid wallet. `billing.wallets` is the system of record; the
        live enforcement balance is a Redis cache reconciled nightly. Balance
        updates stream over the `updates:{org_id}` Pub/Sub → WebSocket channel.
      x-guard: [SUPER_ADMIN, ORG_ADMIN, CUSTOMER]
      parameters:
        - $ref: "#/components/parameters/CustomerId"
      responses:
        "200":
          description: Wallet
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Wallet" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /customers/{customerId}/wallet/config:
    put:
      tags: [Credits & Wallet]
      operationId: updateWalletConfig
      summary: Update auto top-up config (threshold, amount, method, toggle)
      x-guard: [SUPER_ADMIN, ORG_ADMIN, CUSTOMER]
      parameters:
        - $ref: "#/components/parameters/CustomerId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                auto_topup_enabled: { type: boolean }
                low_balance_threshold: { type: number }
                topup_amount: { type: number }
                topup_payment_method_id: { type: [string, "null"], format: uuid }
      responses:
        "200":
          description: Wallet config updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Wallet" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /customers/{customerId}/wallet/topup:
    post:
      tags: [Credits & Wallet]
      operationId: topUpWallet
      summary: Manual wallet top-up (creates a Stripe PaymentIntent)
      description: >
        Proxied to the engine wallet API (`openapi/event-engine.yaml`
        `POST /v1/customers/{customer_id}/wallet/topup`). On payment success
        the ledger and Redis enforcement balance are credited.
      x-guard: [SUPER_ADMIN, ORG_ADMIN, CUSTOMER]
      parameters:
        - $ref: "#/components/parameters/CustomerId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount: { type: number, exclusiveMinimum: 0 }
                payment_method_id:
                  type: string
                  format: uuid
                  description: Defaults to the wallet's designated top-up method
      responses:
        "202":
          description: Top-up initiated (PaymentIntent created)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WalletTransaction" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /customers/{customerId}/wallet/transactions:
    get:
      tags: [Credits & Wallet]
      operationId: listWalletTransactions
      summary: List wallet transactions (burndown / top-ups)
      description: >
        Proxied to the engine wallet API (`openapi/event-engine.yaml`
        `GET /v1/customers/{customer_id}/wallet/transactions`).
      x-guard: [SUPER_ADMIN, ORG_ADMIN, CUSTOMER]
      parameters:
        - $ref: "#/components/parameters/CustomerId"
        - name: type
          in: query
          schema: { $ref: "#/components/schemas/WalletTransactionType" }
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated wallet transactions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedList"
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/WalletTransaction" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ──────────────────────────── Usage (proxy) ──────────────────────────
  /orgs/{orgId}/usage-summary:
    get:
      tags: [Usage (proxy)]
      operationId: getOrgUsageSummary
      summary: Aggregated usage summary for the billing period (BFF proxy)
      description: |
        **BFF proxy to the Go analytics API** (ADR-001 §2.2): validates the
        Keycloak JWT, derives org scope, and forwards service-to-service to
        `GET /v1/orgs/{org_id}/summary` — see `openapi/analytics.yaml`
        (`OrgSummary` schema) for the authoritative upstream response shape.
        The BFF returns a compact `UsageSummary` presentation of that
        payload; it never queries ClickHouse or Postgres for usage.
      x-guard: [SUPER_ADMIN, ORG_ADMIN]
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - name: period_start
          in: query
          schema: { type: string, format: date-time }
        - name: period_end
          in: query
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Usage summary (proxied from the analytics API)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UsageSummary" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "502":
          description: Analytics API unreachable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /organizations/{orgId}/team-usage:
    get:
      tags: [Usage (proxy)]
      operationId: getTeamUsage
      summary: Aggregated team usage for the period (BFF proxy)
      description: |
        **BFF proxy to the Go analytics API**: composes
        `GET /v1/orgs/{org_id}/summary` and
        `GET /v1/orgs/{org_id}/customers/usage` — see
        `openapi/analytics.yaml` for the authoritative upstream response
        schemas. Returns a compact `UsageSummary` plus per-customer rows.
      x-guard: [SUPER_ADMIN, ORG_ADMIN]
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - name: period_start
          in: query
          schema: { type: string, format: date-time }
        - name: period_end
          in: query
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Team usage summary (proxied from the analytics API)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UsageSummary"
                  - type: object
                    properties:
                      customers:
                        type: array
                        description: >
                          Per-customer usage rows; field-level shape per
                          `openapi/analytics.yaml`
                          `/v1/orgs/{org_id}/customers/usage`.
                        items:
                          type: object
                          additionalProperties: true
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "502":
          description: Analytics API unreachable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Keycloak-issued JWT (realm `quantumbilling`). Roles carried in the
        token: SUPER_ADMIN, ORG_ADMIN, CUSTOMER, END_USER, DEVELOPER. NestJS
        guards enforce per-endpoint roles (documented via `x-guard`).
    meterApiKey:
      type: apiKey
      in: header
      name: X-Meter-Api-Key
      description: >
        Meter API key for the event-ingest facade only. Resolves org scope;
        validated by `MeterApiKeyGuard`.

  parameters:
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    OrgId:
      name: orgId
      in: path
      required: true
      schema: { type: string, format: uuid }
    CustomerId:
      name: customerId
      in: path
      required: true
      schema: { type: string, format: uuid }
    EndUserId:
      name: endUserId
      in: path
      required: true
      schema: { type: string, format: uuid }
    MeterId:
      name: meterId
      in: path
      required: true
      schema: { type: string, format: uuid }
    PlanId:
      name: planId
      in: path
      required: true
      schema: { type: string, format: uuid }
    RateCardId:
      name: rateCardId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ContractId:
      name: contractId
      in: path
      required: true
      schema: { type: string, format: uuid }
    SubscriptionId:
      name: subscriptionId
      in: path
      required: true
      schema: { type: string, format: uuid }
    InvoiceId:
      name: invoiceId
      in: path
      required: true
      schema: { type: string, format: uuid }
    PaymentMethodId:
      name: pmId
      in: path
      required: true
      schema: { type: string, format: uuid }
    CreditId:
      name: creditId
      in: path
      required: true
      schema: { type: string, format: uuid }

  responses:
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Authenticated but the guard rejects the caller's role/scope
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource not found (or outside the caller's scope)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    ValidationError:
      description: Request body failed validation
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    # ─── Shared ───
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Machine-readable error code (e.g. DUPLICATE_EVENT, METER_INACTIVE, FORBIDDEN)
            message:
              type: string
            details:
              type: object
              additionalProperties: true

    PaginatedList:
      type: object
      properties:
        items:
          type: array
          items: {}
        totalCount: { type: integer }
        page: { type: integer }
        limit: { type: integer }
        hasNextPage: { type: boolean }

    # ─── Enums (canonical per ERD.md conflict register) ───
    OrgStatus:
      type: string
      enum: [ACTIVE, SUSPENDED, DELETED]
      description: C-14 — status is stored; trial state lives on subscriptions
    CustomerStatus:
      type: string
      enum: [ACTIVE, SUSPENDED, CHURNED]
      description: C-16
    EndUserStatus:
      type: string
      enum: [active, suspended, canceled]
    MeterStatus:
      type: string
      enum: [DRAFT, ACTIVE, INACTIVE]
    MeterAggregation:
      type: string
      enum: [SUM, COUNT, AVG, GAUGE]
    ProductStatus:
      type: string
      enum: [DRAFT, ACTIVE, INACTIVE, ARCHIVED]
    CatalogStatus:
      type: string
      enum: [DRAFT, ACTIVE, ARCHIVED]
    PricingType:
      type: string
      enum: [FLAT, PER_UNIT, TIERED_GRADUATED, TIERED_VOLUME, PACKAGE, MATRIX, COST_PLUS]
      description: CR-3 expanded pricing coverage
    TokenType:
      type: string
      enum: [input, output, cached, thinking]
      description: CR-3 matrix-pricing dimension
    ContractStatus:
      type: string
      enum: [DRAFT, ACTIVE, EXPIRED, TERMINATED]
    BillingPeriod:
      type: string
      enum: [MONTHLY, QUARTERLY, YEARLY]
    SubscriptionStatus:
      type: string
      enum: [scheduled, trialing, active, past_due, suspended, canceled, ended]
      description: C-12 — lowercase set on customer.subscriptions
    InvoiceStatus:
      type: string
      enum: [draft, pending, paid, overdue, voided]
      description: C-4 — canonical lowercase set
    LineType:
      type: string
      enum: [BASE_FEE, USAGE, OVERAGE, COMMIT_TRUE_UP, SEAT, ADJUSTMENT]
      description: ADR-001 §3 typed line items
    RateSource:
      type: string
      enum: [contract_rate, rate_card_version, pricing_model]
      description: ADR-001 §3.3 rating waterfall — resolved source recorded per line
    PaymentStatus:
      type: string
      enum: [PENDING, COMPLETED, FAILED]
    CollectionMode:
      type: string
      enum: [auto_charge, manual, wire]
      description: CR-6 — auto_charge is reserved for the Go billing worker
    PaymentMethodType:
      type: string
      enum: [CARD, ACH, WIRE, BANK_TRANSFER, OTHER]
    CreditNoteStatus:
      type: string
      enum: [draft, issued, applied, refunded]
      description: CR-4 credit-note state machine
    CreditType:
      type: string
      enum: [compensation, promotional, prepaid, commit]
      description: FEFO within ascending priority (compensation=0 … commit=3)
    CreditStatus:
      type: string
      enum: [active, exhausted, expired, revoked]
    WalletStatus:
      type: string
      enum: [active, frozen, closed]
    WalletTransactionType:
      type: string
      enum: [topup, auto_topup, burndown, refund, adjustment]

    # ─── Identity ───
    Organization:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        billing_email: { type: [string, "null"], format: email }
        currency: { type: [string, "null"] }
        country: { type: [string, "null"] }
        industry: { type: [string, "null"] }
        timezone: { type: [string, "null"] }
        status: { $ref: "#/components/schemas/OrgStatus" }
        suspended_at: { type: [string, "null"], format: date-time }
        created_at: { type: string, format: date-time }
    OrganizationCreate:
      type: object
      required: [name]
      properties:
        name: { type: string }
        billing_email: { type: string, format: email }
        currency: { type: string }
        country: { type: string }
        industry: { type: string }
        timezone: { type: string }
    OrganizationUpdate:
      type: object
      properties:
        name: { type: string }
        billing_email: { type: string, format: email }
        currency: { type: string }
        country: { type: string }
        industry: { type: string }
        timezone: { type: string }

    # ─── Customer ───
    Customer:
      type: object
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        name: { type: string }
        email: { type: [string, "null"], format: email }
        billing_email: { type: [string, "null"], format: email }
        billing_address: { type: [object, "null"] }
        credit_balance: { type: number }
        health_score: { type: [integer, "null"] }
        status: { $ref: "#/components/schemas/CustomerStatus" }
        created_at: { type: string, format: date-time }
    CustomerCreate:
      type: object
      required: [name]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        billing_email: { type: string, format: email }
        billing_address: { type: object }
    CustomerUpdate:
      type: object
      properties:
        name: { type: string }
        email: { type: string, format: email }
        billing_email: { type: string, format: email }
        billing_address: { type: object }
        status: { $ref: "#/components/schemas/CustomerStatus" }
    Contact:
      type: object
      properties:
        id: { type: string, format: uuid }
        customer_id: { type: string, format: uuid }
        email: { type: string, format: email }
        designation: { type: [string, "null"] }
        is_primary: { type: boolean }
    ContactCreate:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
        designation: { type: string }
        is_primary: { type: boolean, default: false }

    # ─── End user ───
    EndUser:
      type: object
      properties:
        id: { type: string, format: uuid }
        customer_id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        external_user_id: { type: [string, "null"] }
        name: { type: [string, "null"] }
        email: { type: [string, "null"], format: email }
        status: { $ref: "#/components/schemas/EndUserStatus" }
        metadata: { type: [object, "null"] }
        created_at: { type: string, format: date-time }
    EndUserCreate:
      type: object
      required: [email]
      properties:
        external_user_id: { type: string }
        name: { type: string }
        email: { type: string, format: email }
        metadata: { type: object }
    EndUserUpdate:
      type: object
      properties:
        external_user_id: { type: string }
        name: { type: string }
        email: { type: string, format: email }
        metadata: { type: object }

    # ─── Meter ───
    Meter:
      type: object
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        name: { type: string }
        event_type:
          type: string
          description: NOT meter_type (C-15); supports outcome/agent-action events (CR-10)
        aggregation: { $ref: "#/components/schemas/MeterAggregation" }
        field: { type: [string, "null"] }
        status: { $ref: "#/components/schemas/MeterStatus" }
        last_event_at: { type: [string, "null"], format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    MeterCreate:
      type: object
      required: [name, event_type, aggregation]
      properties:
        name: { type: string }
        event_type: { type: string }
        aggregation: { $ref: "#/components/schemas/MeterAggregation" }
        field: { type: string }
    MeterEventIngest:
      type: object
      required: [value, timestamp, idempotency_key]
      properties:
        value: { type: number }
        timestamp: { type: string, format: date-time }
        idempotency_key:
          type: string
          description: Namespaced to the meter → engine `event_id`; deduped in Redis (SETNX, 24h TTL)

    # ─── Catalog ───
    Product:
      type: object
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        product_code:
          type: string
          description: SKU — NOT sku; unique(org_id, product_code)
        product_name:
          type: string
          description: NOT name
        description: { type: [string, "null"] }
        product_type:
          type: string
          enum: [STANDALONE, ADD_ON, BUNDLE]
        billing_model:
          type: string
          enum: [SUBSCRIPTION, USAGE_BASED, ONE_TIME, HYBRID]
        status: { $ref: "#/components/schemas/ProductStatus" }
        is_public: { type: boolean }
        metadata: { type: [object, "null"] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ProductCreate:
      type: object
      required: [product_code, product_name, product_type, billing_model]
      properties:
        product_code: { type: string }
        product_name: { type: string }
        description: { type: string }
        product_type:
          type: string
          enum: [STANDALONE, ADD_ON, BUNDLE]
        billing_model:
          type: string
          enum: [SUBSCRIPTION, USAGE_BASED, ONE_TIME, HYBRID]
        is_public: { type: boolean, default: false }
        metadata: { type: object }
    ProductUpdate:
      type: object
      properties:
        product_name: { type: string }
        description: { type: string }
        status: { $ref: "#/components/schemas/ProductStatus" }
        is_public: { type: boolean }
        metadata: { type: object }

    Plan:
      type: object
      properties:
        id: { type: string, format: uuid }
        product_id: { type: [string, "null"], format: uuid }
        name: { type: string }
        slug: { type: string }
        billing_period: { $ref: "#/components/schemas/BillingPeriod" }
        trial_days:
          type: [integer, "null"]
          description: CR-14 trials
        base_amount:
          type: number
          description: NOT base_price (C-5)
        currency: { type: string }
        pay_in_advance: { type: boolean }
        is_active: { type: boolean }
        recurring_grant:
          type: [object, "null"]
          description: CR-14 — monthly included credits, reset on anniversary
        seat_included:
          type: [integer, "null"]
          description: CR-3 per-seat pricing
        seat_price: { type: [number, "null"] }
        charges:
          type: array
          items: { $ref: "#/components/schemas/Charge" }
    PlanCreate:
      type: object
      required: [name, slug, billing_period, base_amount, currency]
      properties:
        name: { type: string }
        slug: { type: string }
        billing_period: { $ref: "#/components/schemas/BillingPeriod" }
        base_amount: { type: number }
        currency: { type: string }
        pay_in_advance: { type: boolean, default: false }
        trial_days: { type: integer }
        pricing_model_id: { type: string, format: uuid }
        product_id: { type: string, format: uuid }
    Charge:
      type: object
      properties:
        id: { type: string, format: uuid }
        plan_id: { type: string, format: uuid }
        meter_id: { type: string, format: uuid }
        name: { type: string }
        charge_model: { $ref: "#/components/schemas/PricingType" }
        included_units:
          type: [number, "null"]
          description: Allowance before overage (ADR-001 §3)
        pay_in_advance: { type: boolean }
        is_active: { type: boolean }

    PricingModel:
      type: object
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        meter_id: { type: [string, "null"], format: uuid }
        name: { type: string }
        pricing_type: { $ref: "#/components/schemas/PricingType" }
        config:
          type: [object, "null"]
          description: Matrix dimensions (model × token_type), package size/rounding, markup pct
        minimum_amount:
          type: [number, "null"]
          description: CR-3 per-period minimum
        maximum_amount:
          type: [number, "null"]
          description: CR-3 per-period cap
        effective_from: { type: [string, "null"], format: date }
        version: { type: integer }
        status: { $ref: "#/components/schemas/CatalogStatus" }
        tiers:
          type: array
          items: { $ref: "#/components/schemas/PricingTier" }
    PricingModelCreate:
      type: object
      required: [name, pricing_type]
      properties:
        name: { type: string }
        pricing_type: { $ref: "#/components/schemas/PricingType" }
        meter_id: { type: [string, "null"], format: uuid }
        config: { type: [object, "null"] }
        minimum_amount: { type: [number, "null"] }
        maximum_amount: { type: [number, "null"] }
        effective_from: { type: string, format: date }
        tiers:
          type: array
          items: { $ref: "#/components/schemas/PricingTier" }
    PricingTier:
      type: object
      properties:
        id: { type: string, format: uuid }
        from_qty: { type: number }
        to_qty:
          type: [number, "null"]
          description: null = unbounded
        price_per_unit: { type: number }
        sort_order: { type: integer }

    RateCard:
      type: object
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        name: { type: string }
        effective_date: { type: string, format: date }
        status: { $ref: "#/components/schemas/CatalogStatus" }
        rates:
          type: array
          items: { $ref: "#/components/schemas/RateCardRate" }
    RateCardRate:
      type: object
      properties:
        id: { type: string, format: uuid }
        rate_card_id: { type: string, format: uuid }
        meter_id: { type: string, format: uuid }
        model_name:
          type: [string, "null"]
          description: LLM model for matrix pricing
        token_type:
          oneOf:
            - $ref: "#/components/schemas/TokenType"
            - type: "null"
        rate: { type: number }
        unit_label: { type: string }
    RateCardRateCreate:
      type: object
      required: [meter_id, rate, unit_label]
      properties:
        meter_id: { type: string, format: uuid }
        model_name: { type: string }
        token_type: { $ref: "#/components/schemas/TokenType" }
        rate: { type: number }
        unit_label: { type: string }

    Contract:
      type: object
      properties:
        id: { type: string, format: uuid }
        customer_id: { type: string, format: uuid }
        rate_card_id:
          type: [string, "null"]
          format: uuid
          description: If null, contract-specific rates must be added via POST /contracts/{id}/rates
        name: { type: string }
        commit_amount: { type: number }
        auto_renew: { type: boolean }
        status: { $ref: "#/components/schemas/ContractStatus" }
        start_date: { type: [string, "null"], format: date }
        end_date: { type: [string, "null"], format: date }
        rates:
          type: array
          items: { $ref: "#/components/schemas/ContractRate" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ContractCreate:
      type: object
      required: [customer_id, name]
      properties:
        customer_id: { type: string, format: uuid }
        name: { type: string }
        rate_card_id: { type: [string, "null"], format: uuid }
        commit_amount: { type: number }
        auto_renew: { type: boolean, default: false }
        start_date: { type: string, format: date }
        end_date: { type: string, format: date }
    ContractRate:
      type: object
      properties:
        id: { type: string, format: uuid }
        contract_id: { type: string, format: uuid }
        meter_id: { type: string, format: uuid }
        model_name: { type: [string, "null"] }
        rate: { type: number }
        unit_label: { type: string }
        effective_date: { type: string, format: date }
        expires_date: { type: [string, "null"], format: date }
    ContractRateCreate:
      type: object
      required: [meter_id, rate, effective_date]
      properties:
        meter_id: { type: string, format: uuid }
        model_name: { type: string }
        rate: { type: number }
        unit_label: { type: string }
        effective_date: { type: string, format: date }
        expires_date: { type: string, format: date }

    # ─── Subscription ───
    Subscription:
      type: object
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        customer_id: { type: string, format: uuid }
        plan_id: { type: string, format: uuid }
        contract_id: { type: [string, "null"], format: uuid }
        status: { $ref: "#/components/schemas/SubscriptionStatus" }
        billing_period: { $ref: "#/components/schemas/BillingPeriod" }
        start_date: { type: string, format: date }
        end_date: { type: [string, "null"], format: date }
        current_period_start:
          type: string
          format: date-time
          description: Anniversary window — ADR-001 §3.1
        current_period_end: { type: string, format: date-time }
        cancel_at_period_end: { type: boolean }
        trial_end:
          type: [string, "null"]
          format: date-time
          description: CR-14
        created_at: { type: string, format: date-time }
    SubscriptionCreate:
      type: object
      required: [planId, billingPeriod]
      properties:
        planId: { type: string, format: uuid }
        billingPeriod: { $ref: "#/components/schemas/BillingPeriod" }
        startDate: { type: string, format: date }
        contractId: { type: string, format: uuid }

    # ─── Billing (read models — written by the Go billing worker) ───
    Invoice:
      type: object
      description: >
        Written by the Go billing worker; read-only here. Naming per C-19
        (`invoice_number`, `total`, `credits_applied`); status per C-4.
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        customer_id: { type: string, format: uuid }
        subscription_id: { type: [string, "null"], format: uuid }
        invoice_number:
          type: string
          description: INV-YYYY-MM-NNN — NOT number (C-19)
        status: { $ref: "#/components/schemas/InvoiceStatus" }
        period_start: { type: string, format: date-time }
        period_end: { type: string, format: date-time }
        subtotal: { type: number }
        credits_applied:
          type: number
          description: NOT credits (C-19)
        tax_rate: { type: number }
        tax_amount: { type: number }
        total:
          type: number
          description: NOT amount (C-19)
        currency: { type: string }
        due_date: { type: [string, "null"], format: date }
        issued_at: { type: [string, "null"], format: date-time }
        paid_at: { type: [string, "null"], format: date-time }
        line_items:
          type: array
          items: { $ref: "#/components/schemas/InvoiceLineItem" }
    InvoiceLineItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        invoice_id: { type: string, format: uuid }
        meter_id: { type: [string, "null"], format: uuid }
        line_type: { $ref: "#/components/schemas/LineType" }
        description: { type: string }
        quantity: { type: number }
        unit_price: { type: number }
        amount: { type: number }
        model:
          type: [string, "null"]
          description: LLM model attribution
        subscription_id:
          type: [string, "null"]
          format: uuid
          description: Attribution under CR-8 grouping
        rate_source:
          oneOf:
            - $ref: "#/components/schemas/RateSource"
            - type: "null"
        rate_source_id:
          type: [string, "null"]
          format: uuid
          description: Id of the resolved rate row — CR-1 reproducibility
    CreditNote:
      type: object
      description: CR-1/CR-4 correction primitive — issued invoices are never mutated.
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        customer_id: { type: string, format: uuid }
        invoice_id: { type: string, format: uuid }
        rerating_run_id: { type: [string, "null"], format: uuid }
        note_number: { type: string }
        kind:
          type: string
          enum: [credit, debit]
        amount: { type: number }
        currency: { type: string }
        reason: { type: [string, "null"] }
        status: { $ref: "#/components/schemas/CreditNoteStatus" }
        created_at: { type: string, format: date-time }

    # ─── Payments ───
    Payment:
      type: object
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        customer_id: { type: string, format: uuid }
        invoice_id: { type: [string, "null"], format: uuid }
        payment_method_id: { type: [string, "null"], format: uuid }
        amount: { type: number }
        currency: { type: string }
        status: { $ref: "#/components/schemas/PaymentStatus" }
        collection_mode: { $ref: "#/components/schemas/CollectionMode" }
        failure_reason: { type: [string, "null"] }
        description: { type: [string, "null"] }
        payment_date: { type: [string, "null"], format: date-time }
        created_at: { type: string, format: date-time }
    PaymentRecordCreate:
      type: object
      required: [invoice_uuid, amount, currency, collection_mode]
      properties:
        invoice_uuid: { type: string, format: uuid }
        amount: { type: number, exclusiveMinimum: 0 }
        currency: { type: string }
        collection_mode:
          type: string
          enum: [manual, wire]
          description: auto_charge is rejected — reserved for the billing worker (CR-6)
        payment_method_id: { type: string, format: uuid }
        reference:
          type: string
          description: Gateway/external reference (wire confirmation, check number)
        description: { type: string }

    PaymentMethod:
      type: object
      properties:
        id: { type: string, format: uuid }
        customer_id:
          type: string
          format: uuid
          description: Customer-attached (C-6)
        method_type: { $ref: "#/components/schemas/PaymentMethodType" }
        brand: { type: [string, "null"] }
        last4: { type: [string, "null"] }
        exp_month: { type: [integer, "null"] }
        exp_year: { type: [integer, "null"] }
        bank_name: { type: [string, "null"] }
        billing_name: { type: [string, "null"] }
        billing_address: { type: [object, "null"] }
        is_default: { type: boolean }
        status: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    PaymentMethodCreate:
      type: object
      required: [method_type, gateway_token]
      properties:
        method_type: { $ref: "#/components/schemas/PaymentMethodType" }
        gateway_token:
          type: string
          description: Stripe token — raw card data is never sent or stored
        billing_name: { type: string }
        billing_address: { type: object }
        is_default: { type: boolean, default: false }

    # ─── Credits & wallet ───
    Credit:
      type: object
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        customer_id: { type: string, format: uuid }
        type: { $ref: "#/components/schemas/CreditType" }
        original_amount: { type: number }
        remaining_amount:
          type: number
          description: NOT remaining_balance (C-18)
        used_amount: { type: number }
        priority: { type: integer }
        applicable_to: { type: [string, "null"] }
        status: { $ref: "#/components/schemas/CreditStatus" }
        notes: { type: [string, "null"] }
        expires_at: { type: [string, "null"], format: date-time }
        created_at: { type: string, format: date-time }
    CreditGrant:
      type: object
      required: [amount, type]
      properties:
        amount: { type: number, exclusiveMinimum: 0 }
        type: { $ref: "#/components/schemas/CreditType" }
        priority: { type: integer }
        applicable_to: { type: string }
        expires_at: { type: string, format: date-time }
        notes: { type: string }
    CreditLedgerEntry:
      type: object
      properties:
        id: { type: string, format: uuid }
        credit_id: { type: string, format: uuid }
        invoice_id: { type: [string, "null"], format: uuid }
        type:
          type: string
          enum: [grant, usage, adjustment, expired, revoked, refunded]
        amount: { type: number }
        balance: { type: number }
        description: { type: [string, "null"] }
        created_at: { type: string, format: date-time }

    Wallet:
      type: object
      description: >
        CR-2 prepaid wallet. Postgres record of truth; Redis is the real-time
        enforcement cache, reconciled nightly.
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        customer_id: { type: string, format: uuid }
        balance: { type: number }
        currency: { type: string }
        low_balance_threshold: { type: [number, "null"] }
        auto_topup_enabled: { type: boolean }
        topup_amount: { type: [number, "null"] }
        topup_payment_method_id: { type: [string, "null"], format: uuid }
        status: { $ref: "#/components/schemas/WalletStatus" }
        updated_at: { type: string, format: date-time }
    WalletTransaction:
      type: object
      properties:
        id: { type: string, format: uuid }
        wallet_id: { type: string, format: uuid }
        type: { $ref: "#/components/schemas/WalletTransactionType" }
        amount: { type: number }
        balance_after: { type: number }
        payment_id: { type: [string, "null"], format: uuid }
        period_ref:
          type: [string, "null"]
          description: Burndown aggregation window
        created_at: { type: string, format: date-time }

    # ─── Usage proxy ───
    UsageSummary:
      type: object
      description: >
        Compact BFF presentation of the Go analytics API's org summary.
        Authoritative field-level upstream shape: `openapi/analytics.yaml`
        (`OrgSummary`, `GET /v1/orgs/{org_id}/summary`). The BFF does not
        duplicate or re-derive these figures — it forwards and reshapes.
      properties:
        org_id: { type: string, format: uuid }
        period_start: { type: string, format: date-time }
        period_end: { type: string, format: date-time }
        total_events: { type: integer }
        total_tokens: { type: integer }
        total_cost: { type: number }
        currency: { type: string }
        by_meter:
          type: array
          items:
            type: object
            properties:
              meter_id: { type: string, format: uuid }
              meter_name: { type: string }
              total_usage: { type: number }
              total_cost: { type: number }
